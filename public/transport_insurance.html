<!DOCTYPE html>
<html>
<head>
<title>Bus Insurance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body { font-family:'Poppins',sans-serif; background:#f4f6f9; margin:0; }
.sidebar { height:100vh; background:linear-gradient(180deg,#1e293b,#0f172a); color:white; padding:25px; position:sticky; top:0; }
.sidebar h3 { color:#f59e0b; font-weight:600; margin-bottom:25px; }
.menu-item { padding:10px 12px; margin-bottom:6px; border-radius:8px; cursor:pointer; font-size:13px; }
.menu-item:hover, .menu-item.active { background:#334155; }
.menu-item a { color:white; text-decoration:none; display:block; }
.main { padding:35px; }
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
.page-header h2 { font-weight:600; color:#1e293b; margin:0; }
.form-card { background:white; border-radius:14px; padding:28px; box-shadow:0 6px 18px rgba(0,0,0,0.08); margin-bottom:25px; }
.form-card h5 { font-weight:600; color:#1e293b; margin-bottom:18px; padding-bottom:10px; border-bottom:2px solid #f1f5f9; }
.form-label { font-size:13px; font-weight:500; color:#475569; }
.form-control, .form-select { border:1px solid #e2e8f0; border-radius:8px; font-size:13px; }
.form-control:focus, .form-select:focus { border-color:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,0.1); }
.table-card { background:white; border-radius:14px; overflow:hidden; box-shadow:0 6px 18px rgba(0,0,0,0.08); }
.table-card .table-header { padding:16px 20px; background:#1e293b; color:white; }
.table-card .table-header h5 { margin:0; font-size:15px; }
.table thead th { background:#f8fafc; color:#475569; font-size:12px; text-transform:uppercase; padding:11px 14px; border:none; }
.table tbody td { padding:12px 14px; font-size:13px; vertical-align:middle; border-color:#f1f5f9; }
.table tbody tr:hover { background:#fff7ed; }
.badge-active { background:#dcfce7; color:#166534; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-expired { background:#fee2e2; color:#991b1b; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-expiring { background:#fef3c7; color:#92400e; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.btn-red { background:linear-gradient(135deg,#ef4444,#dc2626); border:none; color:white; padding:8px 18px; border-radius:8px; font-size:13px; }
.btn-red:hover { opacity:0.9; color:white; }
.back-btn { background:#64748b; border:none; color:white; padding:8px 16px; border-radius:8px; font-size:13px; }
.expiry-soon { background:#fef3c7; }
.expiry-past { background:#fee2e2; }

.toast-box{position:fixed;bottom:28px;right:28px;z-index:9999;background:#1e293b;color:white;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);display:none;align-items:center;gap:10px;border-left:4px solid #22c55e}
.toast-box.error{border-left-color:#ef4444}
.toast-box.show{display:flex;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="container-fluid">
<div class="row">
<div class="col-md-2 sidebar">
  <h3>🚌 Transport</h3>
  <div class="menu-item"><a href="transport_inventory.html">📊 Dashboard</a></div>
  <div class="menu-item"><a href="transport_buses.html">🚌 Buses</a></div>
  <div class="menu-item"><a href="transport_routes.html">🗺️ Routes</a></div>
  <div class="menu-item"><a href="transport_stops.html">🛑 Bus Stops</a></div>
  <div class="menu-item"><a href="transport_drivers.html">👨‍✈️ Drivers</a></div>
  <div class="menu-item active"><a href="transport_insurance.html">🛡️ Insurance</a></div>
  <div class="menu-item"><a href="transport_rc.html">📋 RC Book</a></div>
  <div class="menu-item"><a href="transport_fitness.html">✅ Fitness & PUC</a></div>
  <div class="menu-item"><a href="transport_bus_points.html">🎫 Bus Points</a></div>
  <div class="menu-item"><a href="transport_maintenance.html">🔧 Maintenance</a></div>
  <div class="menu-item"><a href="transport_fuel.html">⛽ Fuel Log</a></div>
</div>

<div class="col-md-10 main">
  <div class="page-header">
    <h2>🛡️ Bus Insurance</h2>
    <button class="back-btn" onclick="window.location.href='transport_inventory.html'">← Back</button>
  </div>

  <div class="form-card">
    <h5>➕ Add Insurance Policy</h5>
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Bus *</label>
        <select id="ins_bus_id" class="form-select"></select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Policy Number *</label>
        <input type="text" id="policy_number" class="form-control" placeholder="e.g. POL-2024-001">
      </div>
      <div class="col-md-3">
        <label class="form-label">Insurance Company</label>
        <input type="text" id="insurance_company" class="form-control" placeholder="e.g. New India Assurance">
      </div>
      <div class="col-md-3">
        <label class="form-label">Policy Type</label>
        <select id="policy_type" class="form-select">
          <option value="comprehensive">Comprehensive</option>
          <option value="third_party">Third Party</option>
          <option value="own_damage">Own Damage</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label">Premium Amount (₹)</label>
        <input type="number" id="premium_amount" class="form-control" placeholder="45000">
      </div>
      <div class="col-md-2">
        <label class="form-label">Coverage Amount (₹)</label>
        <input type="number" id="coverage_amount" class="form-control" placeholder="500000">
      </div>
      <div class="col-md-2">
        <label class="form-label">Start Date *</label>
        <input type="date" id="ins_start_date" class="form-control">
      </div>
      <div class="col-md-2">
        <label class="form-label">Expiry Date *</label>
        <input type="date" id="ins_expiry_date" class="form-control">
      </div>
      <div class="col-md-2">
        <label class="form-label">Agent Name</label>
        <input type="text" id="agent_name" class="form-control">
      </div>
      <div class="col-md-2">
        <label class="form-label">Agent Phone</label>
        <input type="text" id="agent_phone" class="form-control">
      </div>
    </div>
    <div class="mt-3">
      <button class="btn-red" onclick="addInsurance()">Save Insurance</button>
      <span id="ins_msg" style="display:none" class="ms-3 text-success fw-bold" style="font-size:13px;"></span>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header"><h5>All Insurance Policies</h5></div>
    <div class="table-responsive">
      <table class="table mb-0">
        <thead>
          <tr>
            <th>Bus</th><th>RC No.</th><th>Policy No.</th><th>Company</th>
            <th>Type</th><th>Premium</th><th>Start</th><th>Expiry</th><th>Agent</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="insuranceTable"></tbody>
      </table>
    </div>
  </div>
</div>
</div>
</div>
<script>
function showToast(msg,isError=false){const t=document.getElementById("toast");document.getElementById("toast_msg").innerText=msg;document.getElementById("toast_icon").innerText=isError?"❌":"✅";t.className="toast-box show"+(isError?" error":"");setTimeout(()=>t.className="toast-box",3500);}

function expiryBadge(dateStr){
  if(!dateStr) return "—";
  const exp = new Date(dateStr); const today = new Date();
  const diff = (exp-today)/(1000*60*60*24);
  const fmt = exp.toLocaleDateString("en-IN");
  if(diff<0) return `<span class="badge-expired">${fmt} Expired</span>`;
  if(diff<30) return `<span class="badge-expiring">${fmt} Soon</span>`;
  return `<span class="badge-active">${fmt}</span>`;
}

async function loadBusDropdown(){
  try{
    const res = await fetch("/api/transport/buses");
    const buses = await res.json();
    document.getElementById("ins_bus_id").innerHTML =
      `<option value="">Select Bus</option>` +
      buses.map(b=>`<option value="${b.id}">${b.bus_number} - ${b.registration_number}</option>`).join("");
  }catch(e){}
}

async function loadInsurance(){
  try{
    const res = await fetch("/api/transport/insurance");
    const data = await res.json();
    const tbody = document.getElementById("insuranceTable");
    if(!data.length){
      tbody.innerHTML = `<tr><td colspan="10" class="text-center py-4 text-muted">No insurance records</td></tr>`;
      return;
    }
    const today = new Date();
    tbody.innerHTML = data.map(i=>{
      const exp = new Date(i.expiry_date);
      const diff = (exp-today)/(1000*60*60*24);
      const rowClass = diff<0 ? "expiry-past" : diff<30 ? "expiry-soon" : "";
      return `<tr class="${rowClass}">
        <td><strong>${i.bus_number}</strong></td>
        <td style="font-size:12px;">${i.registration_number}</td>
        <td>${i.policy_number}</td>
        <td>${i.insurance_company||"—"}</td>
        <td>${i.policy_type}</td>
        <td>₹${Number(i.premium_amount||0).toLocaleString("en-IN")}</td>
        <td>${i.start_date||"—"}</td>
        <td>${expiryBadge(i.expiry_date)}</td>
        <td>${i.agent_name||"—"}<br><small class="text-muted">${i.agent_phone||""}</small></td>
        <td>${expiryBadge(i.expiry_date)}</td>
      </tr>`;
    }).join("");
  }catch(e){ document.getElementById("insuranceTable").innerHTML=`<tr><td colspan="10" class="text-danger text-center">Error loading data</td></tr>`; }
}

async function addInsurance(){
  const body = {
    bus_id: document.getElementById("ins_bus_id").value,
    policy_number: document.getElementById("policy_number").value.trim(),
    insurance_company: document.getElementById("insurance_company").value.trim(),
    policy_type: document.getElementById("policy_type").value,
    premium_amount: document.getElementById("premium_amount").value,
    coverage_amount: document.getElementById("coverage_amount").value,
    start_date: document.getElementById("ins_start_date").value,
    expiry_date: document.getElementById("ins_expiry_date").value,
    agent_name: document.getElementById("agent_name").value.trim(),
    agent_phone: document.getElementById("agent_phone").value.trim(),
  };
  if(!body.bus_id||!body.policy_number||!body.start_date||!body.expiry_date){
    alert("Bus, policy number, and dates are required"); return;
  }
  try{
    const res = await fetch("/api/transport/insurance",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data = await res.json();
    showToast(data.message||"Insurance added successfully!");
    loadInsurance();
  }catch(e){ alert("Error saving"); }
}

window.onload = ()=>{ loadBusDropdown(); loadInsurance(); };
</script>
<div class="toast-box" id="toast"><span id="toast_icon">✅</span><span id="toast_msg"></span></div>
</body>
</html>
