<!DOCTYPE html>
<html>
<head>
<title>Bus Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:#f4f6f9;margin:0}
.sidebar{height:100vh;background:linear-gradient(180deg,#1e293b,#0f172a);color:white;padding:25px;position:sticky;top:0}
.sidebar h3{color:#f59e0b;font-weight:600;margin-bottom:25px}
.menu-item{padding:10px 12px;margin-bottom:6px;border-radius:8px;cursor:pointer;font-size:13px}
.menu-item:hover,.menu-item.active{background:#334155}
.menu-item a{color:white;text-decoration:none;display:block}
.main{padding:35px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}
.page-header h2{font-weight:600;color:#1e293b;margin:0}
.form-card{background:white;border-radius:14px;padding:28px;box-shadow:0 6px 18px rgba(0,0,0,0.08);margin-bottom:25px}
.form-card h5{font-weight:600;color:#1e293b;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid #f1f5f9}
.form-label{font-size:13px;font-weight:500;color:#475569}
.form-control,.form-select{border:1px solid #e2e8f0;border-radius:8px;font-size:13px}
.table-card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.08)}
.table-header{padding:16px 20px;background:#1e293b;color:white}
.table-header h5{margin:0;font-size:15px}
.table thead th{background:#f8fafc;color:#475569;font-size:12px;text-transform:uppercase;padding:11px 14px;border:none}
.table tbody td{padding:12px 14px;font-size:13px;vertical-align:middle;border-color:#f1f5f9}
.badge-completed{background:#dcfce7;color:#166534;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pending{background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-inprogress{background:#dbeafe;color:#1e40af;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.btn-pink{background:linear-gradient(135deg,#ec4899,#db2777);border:none;color:white;padding:8px 18px;border-radius:8px;font-size:13px}
.btn-pink:hover{opacity:0.9;color:white}
.back-btn{background:#64748b;border:none;color:white;padding:8px 16px;border-radius:8px;font-size:13px}

.toast-box{position:fixed;bottom:28px;right:28px;z-index:9999;background:#1e293b;color:white;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);display:none;align-items:center;gap:10px;border-left:4px solid #22c55e}
.toast-box.error{border-left-color:#ef4444}
.toast-box.show{display:flex;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="container-fluid"><div class="row">
<div class="col-md-2 sidebar">
  <h3>🚌 Transport</h3>
  <div class="menu-item"><a href="transport_inventory.html">📊 Dashboard</a></div>
  <div class="menu-item"><a href="transport_buses.html">🚌 Buses</a></div>
  <div class="menu-item"><a href="transport_routes.html">🗺️ Routes</a></div>
  <div class="menu-item"><a href="transport_stops.html">🛑 Bus Stops</a></div>
  <div class="menu-item"><a href="transport_drivers.html">👨‍✈️ Drivers</a></div>
  <div class="menu-item"><a href="transport_insurance.html">🛡️ Insurance</a></div>
  <div class="menu-item"><a href="transport_rc.html">📋 RC Book</a></div>
  <div class="menu-item"><a href="transport_fitness.html">✅ Fitness & PUC</a></div>
  <div class="menu-item"><a href="transport_bus_points.html">🎫 Bus Points</a></div>
  <div class="menu-item active"><a href="transport_maintenance.html">🔧 Maintenance</a></div>
  <div class="menu-item"><a href="transport_fuel.html">⛽ Fuel Log</a></div>
</div>
<div class="col-md-10 main">
  <div class="page-header"><h2>🔧 Bus Maintenance</h2><button class="back-btn" onclick="window.location.href='transport_inventory.html'">← Back</button></div>
  <div class="form-card">
    <h5>➕ Add Maintenance Record</h5>
    <div class="row g-3">
      <div class="col-md-3"><label class="form-label">Bus *</label><select id="m_bus_id" class="form-select"></select></div>
      <div class="col-md-2">
        <label class="form-label">Type</label>
        <select id="m_type" class="form-select">
          <option value="service">Service</option>
          <option value="repair">Repair</option>
          <option value="inspection">Inspection</option>
          <option value="tyre_change">Tyre Change</option>
          <option value="others">Others</option>
        </select>
      </div>
      <div class="col-md-4"><label class="form-label">Description</label><input type="text" id="m_desc" class="form-control" placeholder="Describe maintenance work..."></div>
      <div class="col-md-3"><label class="form-label">Vendor/Garage Name</label><input type="text" id="m_vendor" class="form-control"></div>
      <div class="col-md-2"><label class="form-label">Cost (₹)</label><input type="number" id="m_cost" class="form-control" placeholder="0"></div>
      <div class="col-md-2"><label class="form-label">Maintenance Date *</label><input type="date" id="m_date" class="form-control"></div>
      <div class="col-md-2"><label class="form-label">Next Due Date</label><input type="date" id="m_next_due" class="form-control"></div>
      <div class="col-md-2"><label class="form-label">Odometer (km)</label><input type="number" id="m_odometer" class="form-control"></div>
      <div class="col-md-2">
        <label class="form-label">Status</label>
        <select id="m_status" class="form-select">
          <option value="completed">Completed</option>
          <option value="in_progress">In Progress</option>
          <option value="pending">Pending</option>
        </select>
      </div>
    </div>
    <div class="mt-3"><button class="btn-pink" onclick="addMaintenance()">Save Record</button><span id="m_msg" class="ms-3 text-success fw-bold" style="font-size:13px;"></span></div>
  </div>
  <div class="table-card">
    <div class="table-header"><h5>Maintenance History</h5></div>
    <div class="table-responsive">
      <table class="table mb-0">
        <thead><tr><th>Bus</th><th>Date</th><th>Type</th><th>Description</th><th>Cost</th><th>Vendor</th><th>Odometer</th><th>Next Due</th><th>Status</th></tr></thead>
        <tbody id="maintenanceTable"></tbody>
      </table>
    </div>
  </div>
</div></div></div>
<script>
function showToast(msg,isError=false){const t=document.getElementById("toast");document.getElementById("toast_msg").innerText=msg;document.getElementById("toast_icon").innerText=isError?"❌":"✅";t.className="toast-box show"+(isError?" error":"");setTimeout(()=>t.className="toast-box",3500);}

function statusBadge(s){const m={'completed':'completed','pending':'pending','in_progress':'inprogress'};return`<span class="badge-${m[s]||'pending'}">${s}</span>`;}
async function loadBusDrop(){
  try{const res=await fetch("/api/transport/buses");const buses=await res.json();document.getElementById("m_bus_id").innerHTML=`<option value="">Select Bus</option>`+buses.map(b=>`<option value="${b.id}">${b.bus_number}</option>`).join("");}catch(e){}
}
async function loadMaintenance(){
  try{
    const res=await fetch("/api/transport/maintenance");const data=await res.json();
    const tbody=document.getElementById("maintenanceTable");
    if(!data.length){tbody.innerHTML=`<tr><td colspan="9" class="text-center py-3 text-muted">No records yet</td></tr>`;return;}
    tbody.innerHTML=data.map(r=>`<tr>
      <td><strong>${r.bus_number}</strong></td>
      <td>${r.maintenance_date||"—"}</td>
      <td>${r.maintenance_type}</td>
      <td>${r.description||"—"}</td>
      <td>₹${Number(r.cost||0).toLocaleString("en-IN")}</td>
      <td>${r.vendor_name||"—"}</td>
      <td>${r.odometer_reading||"—"} km</td>
      <td>${r.next_due_date||"—"}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`).join("");
  }catch(e){document.getElementById("maintenanceTable").innerHTML=`<tr><td colspan="9" class="text-danger text-center">Error</td></tr>`;}
}
async function addMaintenance(){
  const body={bus_id:document.getElementById("m_bus_id").value,maintenance_type:document.getElementById("m_type").value,description:document.getElementById("m_desc").value.trim(),vendor_name:document.getElementById("m_vendor").value.trim(),cost:document.getElementById("m_cost").value,maintenance_date:document.getElementById("m_date").value,next_due_date:document.getElementById("m_next_due").value,odometer_reading:document.getElementById("m_odometer").value,status:document.getElementById("m_status").value};
  if(!body.bus_id||!body.maintenance_date){alert("Bus and date required");return;}
  try{const res=await fetch("/api/transport/maintenance",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});const data=await res.json();document.getElementById("m_msg").innerText=data.message;setTimeout(()=>document.getElementById("m_msg").innerText="",3000);loadMaintenance();}catch(e){alert("Error");}
}
window.onload=()=>{loadBusDrop();loadMaintenance();};
</script>
<div class="toast-box" id="toast"><span id="toast_icon">✅</span><span id="toast_msg"></span></div>
</body>
</html>
