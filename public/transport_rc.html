<!DOCTYPE html>
<html>
<head>
<title>RC Book Details</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:#f4f6f9;margin:0}
.sidebar{height:100vh;background:linear-gradient(180deg,#1e293b,#0f172a);color:white;padding:25px;position:sticky;top:0}
.sidebar h3{color:#f59e0b;font-weight:600;margin-bottom:25px}
.menu-item{padding:10px 12px;margin-bottom:6px;border-radius:8px;cursor:pointer;font-size:13px}
.menu-item:hover,.menu-item.active{background:#334155}
.menu-item a{color:white;text-decoration:none;display:block}
.main{padding:35px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}
.page-header h2{font-weight:600;color:#1e293b;margin:0}
.form-card{background:white;border-radius:14px;padding:28px;box-shadow:0 6px 18px rgba(0,0,0,0.08);margin-bottom:25px}
.form-card h5{font-weight:600;color:#1e293b;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid #f1f5f9}
.form-label{font-size:13px;font-weight:500;color:#475569}
.form-control,.form-select{border:1px solid #e2e8f0;border-radius:8px;font-size:13px}
.form-control:focus,.form-select:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,0.1)}
.table-card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.08)}
.table-header{padding:16px 20px;background:#1e293b;color:white}
.table-header h5{margin:0;font-size:15px}
.table thead th{background:#f8fafc;color:#475569;font-size:12px;text-transform:uppercase;padding:11px 14px;border:none}
.table tbody td{padding:12px 14px;font-size:13px;vertical-align:middle;border-color:#f1f5f9}
.table tbody tr:hover{background:#f5f3ff}
.badge-active{background:#dcfce7;color:#166534;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-expired{background:#fee2e2;color:#991b1b;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-expiring{background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);border:none;color:white;padding:8px 18px;border-radius:8px;font-size:13px}
.btn-purple:hover{opacity:0.9;color:white}
.back-btn{background:#64748b;border:none;color:white;padding:8px 16px;border-radius:8px;font-size:13px}

.toast-box{position:fixed;bottom:28px;right:28px;z-index:9999;background:#1e293b;color:white;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);display:none;align-items:center;gap:10px;border-left:4px solid #22c55e}
.toast-box.error{border-left-color:#ef4444}
.toast-box.show{display:flex;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="container-fluid">
<div class="row">
<div class="col-md-2 sidebar">
  <h3>🚌 Transport</h3>
  <div class="menu-item"><a href="transport_inventory.html">📊 Dashboard</a></div>
  <div class="menu-item"><a href="transport_buses.html">🚌 Buses</a></div>
  <div class="menu-item"><a href="transport_routes.html">🗺️ Routes</a></div>
  <div class="menu-item"><a href="transport_stops.html">🛑 Bus Stops</a></div>
  <div class="menu-item"><a href="transport_drivers.html">👨‍✈️ Drivers</a></div>
  <div class="menu-item"><a href="transport_insurance.html">🛡️ Insurance</a></div>
  <div class="menu-item active"><a href="transport_rc.html">📋 RC Book</a></div>
  <div class="menu-item"><a href="transport_fitness.html">✅ Fitness & PUC</a></div>
  <div class="menu-item"><a href="transport_bus_points.html">🎫 Bus Points</a></div>
  <div class="menu-item"><a href="transport_maintenance.html">🔧 Maintenance</a></div>
  <div class="menu-item"><a href="transport_fuel.html">⛽ Fuel Log</a></div>
</div>
<div class="col-md-10 main">
  <div class="page-header">
    <h2>📋 RC Book Details</h2>
    <button class="back-btn" onclick="window.location.href='transport_inventory.html'">← Back</button>
  </div>

  <div class="form-card">
    <h5>📝 Add / Update RC Book</h5>
    <div class="row g-3">
      <div class="col-md-3"><label class="form-label">Bus *</label><select id="rc_bus_id" class="form-select" onchange="loadRCForBus()"></select></div>
      <div class="col-md-3"><label class="form-label">Registration Date</label><input type="date" id="rc_reg_date" class="form-control"></div>
      <div class="col-md-3"><label class="form-label">Registered Owner</label><input type="text" id="rc_owner" class="form-control" placeholder="Chennai Institute of Technology"></div>
      <div class="col-md-3"><label class="form-label">Registration Authority (RTO)</label><input type="text" id="rc_authority" class="form-control" placeholder="RTO Chennai Central"></div>
      <div class="col-md-2"><label class="form-label">RC Expiry Date</label><input type="date" id="rc_expiry" class="form-control"></div>
      <div class="col-md-3"><label class="form-label">Hypothecation (Bank/Finance)</label><input type="text" id="rc_hypo" class="form-control" placeholder="e.g. State Bank of India"></div>
      <div class="col-md-2"><label class="form-label">Gross Vehicle Weight</label><input type="text" id="rc_gvw" class="form-control" placeholder="e.g. 10200 kg"></div>
      <div class="col-md-2"><label class="form-label">Unladen Weight</label><input type="text" id="rc_uw" class="form-control" placeholder="e.g. 5800 kg"></div>
    </div>
    <div class="mt-3">
      <button class="btn-purple" onclick="saveRC()">Save RC Book</button>
      <span id="rc_msg" class="ms-3 text-success fw-bold" style="font-size:13px;"></span>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header"><h5>RC Book Records</h5></div>
    <div class="table-responsive">
      <table class="table mb-0">
        <thead><tr><th>Bus No.</th><th>RC Number</th><th>Owner</th><th>RTO</th><th>Reg Date</th><th>RC Expiry</th><th>GVW</th><th>Hypothecation</th></tr></thead>
        <tbody id="rcTable"></tbody>
      </table>
    </div>
  </div>
</div>
</div>
</div>
<script>
function showToast(msg,isError=false){const t=document.getElementById("toast");document.getElementById("toast_msg").innerText=msg;document.getElementById("toast_icon").innerText=isError?"❌":"✅";t.className="toast-box show"+(isError?" error":"");setTimeout(()=>t.className="toast-box",3500);}

function expiryBadge(d){
  if(!d)return"—";
  const exp=new Date(d),today=new Date(),diff=(exp-today)/(86400000),fmt=exp.toLocaleDateString("en-IN");
  if(diff<0)return`<span class="badge-expired">${fmt} Expired</span>`;
  if(diff<30)return`<span class="badge-expiring">${fmt} Soon</span>`;
  return`<span class="badge-active">${fmt}</span>`;
}
let busMap={};
async function loadBusDrop(){
  try{
    const res=await fetch("/api/transport/buses");
    const buses=await res.json();
    buses.forEach(b=>{busMap[b.id]=b;});
    document.getElementById("rc_bus_id").innerHTML=`<option value="">Select Bus</option>`+
      buses.map(b=>`<option value="${b.id}">${b.bus_number} — ${b.registration_number}</option>`).join("");
  }catch(e){}
}
async function loadRCForBus(){
  const busId=document.getElementById("rc_bus_id").value;
  if(!busId)return;
  try{
    const res=await fetch(`/api/transport/rc/${busId}`);
    const d=await res.json();
    if(d){
      document.getElementById("rc_reg_date").value=d.registration_date||"";
      document.getElementById("rc_owner").value=d.registered_owner||"";
      document.getElementById("rc_authority").value=d.registration_authority||"";
      document.getElementById("rc_expiry").value=d.rc_expiry_date||"";
      document.getElementById("rc_hypo").value=d.hypothecation||"";
      document.getElementById("rc_gvw").value=d.gross_vehicle_weight||"";
      document.getElementById("rc_uw").value=d.unladen_weight||"";
    }
  }catch(e){}
}
async function loadAllRC(){
  try{
    const res=await fetch("/api/transport/buses");
    const buses=await res.json();
    const tbody=document.getElementById("rcTable");
    if(!buses.length){tbody.innerHTML=`<tr><td colspan="8" class="text-center py-4 text-muted">No buses yet</td></tr>`;return;}
    const rows=await Promise.all(buses.map(async b=>{
      try{
        const r=await(await fetch(`/api/transport/rc/${b.id}`)).json();
        if(!r)return`<tr><td><strong>${b.bus_number}</strong></td><td>${b.registration_number}</td><td colspan="6" class="text-muted" style="font-size:12px;">RC not added yet</td></tr>`;
        return`<tr>
          <td><strong>${b.bus_number}</strong></td>
          <td style="font-family:monospace">${b.registration_number}</td>
          <td>${r.registered_owner||"—"}</td>
          <td>${r.registration_authority||"—"}</td>
          <td>${r.registration_date||"—"}</td>
          <td>${expiryBadge(r.rc_expiry_date)}</td>
          <td>${r.gross_vehicle_weight||"—"}</td>
          <td>${r.hypothecation||"—"}</td>
        </tr>`;
      }catch(e){return"";}
    }));
    tbody.innerHTML=rows.join("");
  }catch(e){}
}
async function saveRC(){
  const body={
    bus_id:document.getElementById("rc_bus_id").value,
    registration_date:document.getElementById("rc_reg_date").value,
    registered_owner:document.getElementById("rc_owner").value.trim(),
    registration_authority:document.getElementById("rc_authority").value.trim(),
    rc_expiry_date:document.getElementById("rc_expiry").value,
    hypothecation:document.getElementById("rc_hypo").value.trim(),
    gross_vehicle_weight:document.getElementById("rc_gvw").value.trim(),
    unladen_weight:document.getElementById("rc_uw").value.trim(),
  };
  if(!body.bus_id){alert("Select a bus");return;}
  try{
    const res=await fetch("/api/transport/rc",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data=await res.json();
    document.getElementById("rc_msg").innerText=data.message;
    setTimeout(()=>document.getElementById("rc_msg").innerText="",3000);
    loadAllRC();
  }catch(e){alert("Error saving");}
}
window.onload=()=>{loadBusDrop();loadAllRC();};
</script>
<div class="toast-box" id="toast"><span id="toast_icon">✅</span><span id="toast_msg"></span></div>
</body>
</html>
